# Install with `pre-commit install` (run by scripts/setup.sh).
# Run on demand with `pre-commit run --all-files`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict, project packages only)
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        files: ^(arxiv_deep|experiment_tracker)/
