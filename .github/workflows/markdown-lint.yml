name: markdown-lint

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-lint.yml"
      - ".markdownlint.json"
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-lint.yml"
      - ".markdownlint.json"

concurrency:
  group: markdown-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          # README, docs/, examples/, demo/. Ignore CHANGELOG noise (Keep a
          # Changelog allows long lines and bare URLs that markdownlint
          # would otherwise flag).
          globs: |
            README.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            docs/**/*.md
            demo/**/*.md
            examples/**/*.md
          config: .markdownlint.json
