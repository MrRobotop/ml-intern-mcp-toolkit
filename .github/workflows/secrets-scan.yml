name: secrets-scan

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # gitleaks needs full history; without fetch-depth 0 it only sees
          # the tip commit and silently skips the rest of the history.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
